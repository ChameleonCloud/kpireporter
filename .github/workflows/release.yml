name: release

env:
  IMAGE: ghcr.io/chameleoncloud/kpireporter
  PYTHON_BASE_IMAGE: 3.8-slim-bullseye
  PYTHON_VERSION: "3.8"

on:
  push:
    branches:
      - "main"
    tags:
      # matches tags like 0.1.9, but intentionally not like  sql/0.1.0
      - "*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install tox
        run: pip install tox
      - name: Run lint
        run: tox -e lint

  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Assemble plugin requirements
        run: make plugin-requirements.txt
      - name: Install tox
        run: pip install tox
      - name: Run tests
        run: tox -e unit
        # Google Analytics tests skip automatically when this is unset.
        env:
          KPIREPORT_ENCRYPTION_KEY: ${{ secrets.KPIREPORT_ENCRYPTION_KEY }}

  docker:
    runs-on: ubuntu-latest
    needs: [lint, unittest]
    steps:
      - uses: actions/checkout@v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble plugin requirements
        run: make plugin-requirements.txt

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            python_version=${{ env.PYTHON_BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
