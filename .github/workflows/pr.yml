---
name: Pull request gate

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install tox
        run: pip install tox
      - name: Run lint
        run: tox -e lint

  test:
    name: Run tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Assemble plugin requirements
        run: make plugin-requirements.txt
      - name: Install tox
        run: pip install tox
      - name: Run tests
        run: tox -e unit
        env:
          # Google Analytics tests skip automatically when this is unset.
          KPIREPORT_ENCRYPTION_KEY: ${{ secrets.KPIREPORT_ENCRYPTION_KEY }}
